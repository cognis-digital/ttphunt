apiVersion: apps/v1
kind: Deployment
metadata: { name: ttphunt, labels: { app: ttphunt } }
spec:
  replicas: 1
  selector: { matchLabels: { app: ttphunt } }
  template:
    metadata: { labels: { app: ttphunt } }
    spec:
      containers:
        - name: ttphunt
          image: ghcr.io/cognis-digital/ttphunt:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: ttphunt }
spec:
  selector: { app: ttphunt }
  ports: [{ port: 80, targetPort: 8000 }]
